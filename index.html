<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { background: #f8f7f4; font-family: 'Lora', Georgia, serif; color: #1a1a1a; }

  /* Tweaks panel */
  #tweaks-panel {
    display: none; position: fixed; bottom: 24px; right: 24px; z-index: 9999;
    background: white; border: 1px solid #ddd; border-radius: 12px;
    padding: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.12); width: 260px;
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
  }
  #tweaks-panel h3 { font-family: 'Playfair Display', serif; font-size: 14px; margin-bottom: 14px; color: #1b2d4f; }
  .tweak-row { margin-bottom: 12px; }
  .tweak-row label { display: block; color: #555; margin-bottom: 5px; }
  .tweak-row select, .tweak-row input[type=range] { width: 100%; }
  .tweak-btn { background: #1b2d4f; color: white; border: none; border-radius: 6px;
    padding: 6px 12px; cursor: pointer; font-size: 11px; margin-top: 4px; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-up { animation: fadeUp 0.55s ease both; }
  .fade-up-delay-1 { animation-delay: 0.08s; }
  .fade-up-delay-2 { animation-delay: 0.16s; }
  .fade-up-delay-3 { animation-delay: 0.24s; }
  .fade-up-delay-4 { animation-delay: 0.32s; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #c0c8d8; border-radius: 3px; }
</style>

<body>
<div id="root"></div>

<script type="application/json" id="tweak-defaults">
/*EDITMODE-BEGIN*/{
  "theme": "navy",
  "fontStyle": "serif",
  "density": "comfortable"
}/*EDITMODE-END*/
</script>

<div id="tweaks-panel">
  <h3>Tweaks</h3>
  <div class="tweak-row">
    <label>Color Theme</label>
    <select id="tweak-theme">
      <option value="navy">Navy + Blue (default)</option>
      <option value="sage">Charcoal + Sage</option>
      <option value="warm">Warm Brown</option>
    </select>
  </div>
  <div class="tweak-row">
    <label>Typography</label>
    <select id="tweak-font">
      <option value="serif">Playfair + Lora (Serif)</option>
      <option value="mixed">Playfair + Source Sans</option>
    </select>
  </div>
  <div class="tweak-row">
    <label>Content Density</label>
    <select id="tweak-density">
      <option value="comfortable">Comfortable</option>
      <option value="compact">Compact</option>
    </select>
  </div>
</div>

    { num: 5, text: `Qiu, Z. (2025). From Perception to Communication: A Theory of Types for Action and Meaning by Robin Cooper [Review]. <em>Journal of Pragmatics</em>, 235, 112–114.`, url: 'https://www.sciencedirect.com/science/article/pii/S0378216624002121' },
    { num: 6, text: `Buchanan, E. M., Cuccolo, K., Heyman, T., et al. (2025). Measuring the semantic priming effect across many languages. <em>Nature Human Behaviour</em>. [Contributing author: Z. Qiu]`, url: 'https://doi.org/10.1038/s41562-025-02254-x' },

    { num: 10, text: `Qiu, Z., Duan, X., & Cai, Z. (2023). Does ChatGPT Resemble Humans in Processing Implicatures? In <em>Proceedings of the 4th NaLoMA Workshop</em>. ACL.`, url: 'https://aclanthology.org/2023.naloma-1.3/' },

    { num: 12, text: `Ferreira, F., & Qiu, Z. (2021). Predicting syntactic structure. <em>Brain Research</em>, 1770, 147632.`, url: 'https://doi.org/10.1016/j.brainres.2021.147632' },

    { year: 2020, text: `Qiu, Z., & Ferreira, F. Processing of Nested Epistemic Expressions. <em>CUNY 33</em>, March 2020.` },
  ],
};

function PhotoPlaceholder({ theme }) {
  return (
    <div style={{
      width: 120, height: 120, borderRadius: '50%',
      background: `repeating-linear-gradient(45deg, ${theme.sidebarText}10 0px, ${theme.sidebarText}10 4px, transparent 4px, transparent 12px)`,
      border: `2px solid ${theme.sidebarMuted}`,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      margin: '0 auto 20px',
      overflow: 'hidden', flexShrink: 0,
    }}>
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
        <circle cx="20" cy="15" r="7" fill={theme.sidebarMuted}/>
        <ellipse cx="20" cy="34" rx="13" ry="9" fill={theme.sidebarMuted}/>
      </svg>
    </div>
  );
}

function Section({ id, title, children, theme, density }) {
  const pad = density === 'compact' ? '40px 48px' : '60px 64px';
  return (
    <section id={id} data-screen-label={title} style={{ padding: pad, borderBottom: `1px solid ${theme.border}` }}>
      <h2 style={{
        fontFamily: "'Playfair Display', Georgia, serif",
        fontSize: density === 'compact' ? '1.5rem' : '1.85rem',
        fontWeight: 700, color: theme.heading,
        marginBottom: density === 'compact' ? '24px' : '32px',
        letterSpacing: '-0.02em',
        paddingBottom: '10px',
        borderBottom: `2px solid ${theme.accent}`,
        display: 'block',
      }}>{title}</h2>
      {children}
    </section>
  );
}

function PubList({ items, numbered, theme }) {
  return (
    <ol style={{ listStyle: 'none', padding: 0 }}>
      {items.map((item, i) => (
        <li key={i} style={{ display: 'flex', gap: '12px', marginBottom: '16px', lineHeight: 1.65, fontSize: '0.93rem' }}>
          {numbered && <span style={{ color: theme.accent, fontFamily: 'JetBrains Mono, monospace', fontSize: '0.78rem', minWidth: 22, paddingTop: '3px', fontWeight: 500 }}>{item.num || i+1}.</span>}
          <div>
            <span dangerouslySetInnerHTML={{ __html: item.text }}/>
            {item.url && <a href={item.url} target="_blank" rel="noopener noreferrer" style={{ color: theme.accent, marginLeft: 6, fontSize: '0.8rem', textDecoration: 'none', borderBottom: `1px solid ${theme.accent}40` }}>[link]</a>}
          </div>
        </li>
      ))}
    </ol>
  );
}

function Tag({ children, theme }) {
  return (
    <span style={{
      background: theme.tag, color: theme.tagText,
      padding: '3px 10px', borderRadius: 20, fontSize: '0.78rem',
      fontFamily: 'JetBrains Mono, monospace', display: 'inline-block', marginRight: 6, marginBottom: 6,
    }}>{children}</span>
  );
}

function App() {
  const defaults = { theme: 'navy', fontStyle: 'serif', density: 'comfortable' };
  const [opts, setOpts] = useState(defaults);
  const [activeSection, setActiveSection] = useState('about');
  const [tweaksVisible, setTweaksVisible] = useState(false);

  const theme = THEMES[opts.theme] || THEMES.navy;

  // Tweaks communication
  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksVisible(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  // Scroll spy
  useEffect(() => {
    const sections = NAV_ITEMS.map(n => document.getElementById(n.id)).filter(Boolean);
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) setActiveSection(e.target.id); });
    }, { threshold: 0.25 });
    sections.forEach(s => obs.observe(s));
    return () => obs.disconnect();
  }, []);

  // Tweaks panel wiring
  useEffect(() => {
    const panel = document.getElementById('tweaks-panel');
    if (panel) panel.style.display = tweaksVisible ? 'block' : 'none';
    const themeEl = document.getElementById('tweak-theme');
    const fontEl = document.getElementById('tweak-font');
    const densityEl = document.getElementById('tweak-density');
    if (!themeEl) return;
    themeEl.value = opts.theme;
    fontEl.value = opts.fontStyle;
    densityEl.value = opts.density;
    const apply = () => {
      const newOpts = { theme: themeEl.value, fontStyle: fontEl.value, density: densityEl.value };
      setOpts(newOpts);
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: newOpts }, '*');
    };
    themeEl.onchange = apply; fontEl.onchange = apply; densityEl.onchange = apply;
  }, [tweaksVisible, opts]);

  const bodyFont = opts.fontStyle === 'mixed' ? "'Source Sans 3', sans-serif" : "'Lora', Georgia, serif";
  const density = opts.density;

  const scrollTo = (id) => {
    const el = document.getElementById(id);
    if (el) { const top = el.getBoundingClientRect().top + window.scrollY - 20; window.scrollTo({ top, behavior: 'smooth' }); }
  };

  return (
    <div style={{ display: 'flex', minHeight: '100vh', fontFamily: bodyFont }}>
      {/* Sidebar */}
      <aside style={{
        width: 240, minWidth: 240, background: theme.sidebar,
        position: 'sticky', top: 0, height: '100vh',
        display: 'flex', flexDirection: 'column',
        padding: '40px 24px',
        overflowY: 'auto',
      }}>
        <div className="fade-up" style={{ textAlign: 'center', marginBottom: 32 }}>
          <PhotoPlaceholder theme={theme}/>
          <div style={{ fontFamily: "'Playfair Display', serif", fontSize: '1.15rem', fontWeight: 700, color: theme.sidebarText, lineHeight: 1.3, marginBottom: 6 }}>
            Zhuang Qiu
          </div>
          <div style={{ fontSize: '0.72rem', color: theme.sidebarMuted, lineHeight: 1.5 }}>
            Assistant Professor<br/>
            <a href="https://www.cityu.edu.mo" target="_blank" rel="noopener noreferrer" style={{ color: theme.sidebarMuted, textDecoration: 'underline' }}>City University of Macau</a><br/>
            <span style={{ marginTop: 4, display: 'inline-block', opacity: 0.75 }}>Ph.D. Linguistics, <a href="https://www.ucdavis.edu" target="_blank" rel="noopener noreferrer" style={{ color: theme.sidebarMuted, textDecoration: 'underline' }}>UC Davis</a></span>
          </div>
        </div>

        <nav style={{ flex: 1 }}>
          {NAV_ITEMS.map((item, i) => (
            <button key={item.id}
              onClick={() => scrollTo(item.id)}
              className={`fade-up fade-up-delay-${Math.min(i+1,4)}`}
              style={{
                display: 'block', width: '100%', textAlign: 'left',
                background: 'none', border: 'none', cursor: 'pointer',
                padding: '7px 10px', borderRadius: 6, marginBottom: 2,
                fontSize: '0.82rem', letterSpacing: '0.03em',
                color: activeSection === item.id ? theme.sidebarActive : theme.sidebarMuted,
                fontFamily: "'JetBrains Mono', monospace",
                borderLeft: activeSection === item.id ? `2px solid ${theme.sidebarActive}` : '2px solid transparent',
                transition: 'all 0.2s',
              }}
            >{item.label}</button>
          ))}
        </nav>

        <div style={{ marginTop: 'auto', paddingTop: 24 }}>
          <a href="#" style={{ display: 'block', textAlign: 'center', background: theme.sidebarActive, color: '#fff', borderRadius: 6, padding: '8px 0', fontSize: '0.75rem', fontFamily: "'JetBrains Mono', monospace", textDecoration: 'none', letterSpacing: '0.05em' }}>
            Download CV
          </a>
          <div style={{ textAlign: 'center', marginTop: 14, display: 'flex', justifyContent: 'center', gap: 14 }}>
            <a href="mailto:zhuangqiu@cityu.edu.mo" style={{ color: theme.sidebarMuted, fontSize: '0.7rem', textDecoration: 'none' }}>Email</a>
            <a href="https://scholar.google.com" target="_blank" rel="noopener noreferrer" style={{ color: theme.sidebarMuted, fontSize: '0.7rem', textDecoration: 'none' }}>Scholar</a>
            <a href="https://github.com/ZhuangHarveyQiu" target="_blank" rel="noopener noreferrer" style={{ color: theme.sidebarMuted, fontSize: '0.7rem', textDecoration: 'none' }}>GitHub</a>
          </div>
        </div>
      </aside>

      {/* Main content */}
      <main style={{ flex: 1, maxWidth: 820, background: theme.bg }}>

        {/* About */}
        <section id="about" data-screen-label="About" style={{ padding: density === 'compact' ? '40px 48px' : '64px 64px', borderBottom: `1px solid ${theme.border}` }}>
          <h1 className="fade-up" style={{ fontFamily: "'Playfair Display', serif", fontSize: density === 'compact' ? '2.2rem' : '2.8rem', fontWeight: 700, color: theme.heading, letterSpacing: '-0.03em', marginBottom: 8 }}>
            Zhuang Qiu
          </h1>
          <p className="fade-up fade-up-delay-1" style={{ color: theme.accent, fontSize: '1rem', marginBottom: 28, fontFamily: "'JetBrains Mono', monospace", fontSize: '0.82rem', letterSpacing: '0.05em' }}>
            ASSISTANT PROFESSOR · CITY UNIVERSITY OF MACAU
          </p>
          <p className="fade-up fade-up-delay-2" style={{ lineHeight: 1.85, fontSize: '0.97rem', color: '#2a2a2a', maxWidth: 640 }}>
            My research investigates how large language models (LLMs) and psycholinguistic insights
            can be used to design valid, transparent, and pedagogically meaningful assessments and
            feedback for L2 English learning and teaching.
          </p>
        </section>

        {/* News */}
        <Section id="news" title="News & Updates" theme={theme} density={density}>
          {[
            { date: 'Mar 2026', text: 'Invited talk at the 8th International Conference on Natural Language Processing (ICNLP 2026).' },
            { date: 'Feb 2026', text: 'New book chapter published in <em>Lingua ex machina: AI, Multilingualism, and Interculturality</em> (Routledge).' },
            { date: 'Jan 2026', text: 'Joined the Editorial Board of Springer\'s book series on AI, Intercultural Communication, and Education.' },
            { date: 'Dec 2025', text: 'New article on grammaticality representation in ChatGPT published in <em>Humanities and Social Sciences Communications</em>.' },
          ].map((item, i) => (
            <div key={i} style={{ display: 'flex', gap: 20, marginBottom: 16, alignItems: 'flex-start' }}>
              <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: '0.73rem', color: theme.accent, minWidth: 70, paddingTop: 3 }}>{item.date}</span>
              <p style={{ fontSize: '0.91rem', lineHeight: 1.65, color: '#333' }} dangerouslySetInnerHTML={{ __html: item.text }}/>
            </div>
          ))}
        </Section>

        {/* Research */}
        <Section id="research" title="Research Interests" theme={theme} density={density}>
          <p style={{ lineHeight: 1.85, fontSize: '0.97rem', color: '#2a2a2a', marginBottom: 24, maxWidth: 640 }}>
            My work sits at the intersection of computational linguistics, psycholinguistics, and language pedagogy. I am particularly interested in:
          </p>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, marginBottom: 28 }}>
            {['LLM-based Language Assessment', 'L2 English Writing', 'Scalar Implicature', 'Epistemic Modality', 'Pragmatic Processing', 'Grammaticality Judgment', 'Psycholinguistics', 'NLP for Education'].map(t => (
              <Tag key={t} theme={theme}>{t}</Tag>
            ))}
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
            {[
              { title: 'LLMs & Assessment', desc: 'Using large language models to build valid and transparent assessments for L2 English learners.' },
